name: Republish release

on:
  repository_dispatch:
    types: [publish-release]

permissions: {}

concurrency:
  group: republish
  cancel-in-progress: false

env:
  MAX_RELEASES_PER_APP: 10

jobs:
  republish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate payload
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          # Notes on the schema:
          # - app:        kebab-ish identifier; used as a tag fragment, manifest key, and
          #               filename component, so no slashes or whitespace.
          # - version:    standard dotted-numeric, optionally with a pre-release/build suffix.
          # - source_repo: owner/name; identifies which repo's release to download from.
          # - source_tag: tag of the release on source_repo whose assets we mirror.
          # - web_url:    if present, either empty (clear) or an https URL (set).
          # - asset_metadata: optional object keyed by source-release asset filename. Each
          #               value is an object whose recognised keys are `hidden` (bool) and
          #               `label` (string, <=128 chars). Unknown keys inside a value are
          #               ignored (forward-compat). Keys must match the asset-name regex
          #               so they can never name a different file than what we download.
          # The asset list isn't part of the payload — the publisher resolves it from
          # source_repo/source_tag using SOURCE_REPO_TOKEN, which keeps the source
          # repo's dispatch token free of any read-scope requirement.
          echo "$PAYLOAD" | jq -e '
            (.app | type == "string" and test("^[a-z0-9][a-z0-9._-]{0,63}$")) and
            (.version | type == "string" and test("^[0-9]+(\\.[0-9]+){0,2}([.+-][A-Za-z0-9.]+)?$")) and
            (.source_repo | type == "string" and test("^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$")) and
            (.source_tag | type == "string" and (length > 0)) and
            ((.notes // "") | type == "string") and
            ((.web_url // null) as $w |
              ($w == null) or ($w == "") or ($w | type == "string" and startswith("https://"))
            ) and
            ((.asset_metadata // {}) as $m |
              ($m | type == "object") and
              (all($m | keys[]; test("^[A-Za-z0-9._-]+$"))) and
              (all($m | to_entries[]; .value | type == "object")) and
              (all($m | to_entries[];
                ((.value.hidden // false) | type == "boolean") and
                ((.value.label // "") | type == "string" and (length <= 128))
              ))
            )
          ' > /dev/null

      - name: Sanitize notes
        id: notes
        env:
          RAW_NOTES: ${{ github.event.client_payload.notes }}
        run: |
          # Strip CI directive markers like [release], [publish], [skip ci] from notes
          # before they reach the public release body or the manifest.
          cleaned=$(printf '%s' "$RAW_NOTES" \
            | sed -E 's/\[(release|publish|skip ci|skip release|no ci)\]//gi' \
            | sed -E 's/[[:space:]]+$//')
          {
            echo "value<<EOF"
            printf '%s\n' "$cleaned"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download assets from source repo
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_TAG: ${{ github.event.client_payload.source_tag }}
        run: |
          mkdir -p dist

          # Resolve the asset list ourselves rather than trust whatever the
          # source-side dispatcher claimed. Reject filenames with shell or
          # path-traversal metacharacters before letting them name a file.
          assets=$(gh release view "$SOURCE_TAG" \
            --repo "$SOURCE_REPO" \
            --json assets \
            --jq '[.assets[] | {name: .name, url: .apiUrl}]')
          if [ "$(echo "$assets" | jq 'length')" -eq 0 ]; then
            echo "::error::Source release $SOURCE_REPO@$SOURCE_TAG has no assets"
            exit 1
          fi
          if ! echo "$assets" | jq -e 'all(.[]; .name | test("^[A-Za-z0-9._-]+$"))' >/dev/null; then
            echo "::error::At least one asset name has unsafe characters"
            exit 1
          fi

          echo "$assets" | jq -c '.[]' | while read -r asset; do
            name=$(echo "$asset" | jq -r '.name')
            url=$(echo "$asset" | jq -r '.url')
            echo "Downloading $name"
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o "dist/$name" \
              "$url"
          done
          ls -la dist

      - name: Create public release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.app }}-v${{ github.event.client_payload.version }}
          name: ${{ github.event.client_payload.app }} v${{ github.event.client_payload.version }}
          body: |
            **${{ github.event.client_payload.app }}** v${{ github.event.client_payload.version }}

            Source: `${{ github.event.client_payload.source_repo }}` @ `${{ github.event.client_payload.source_tag }}`

            ${{ steps.notes.outputs.value }}
          files: dist/*
          fail_on_unmatched_files: true

      - name: Build release entry
        id: entry
        env:
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_TAG: ${{ github.event.client_payload.source_tag }}
          NOTES: ${{ steps.notes.outputs.value }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          ASSET_METADATA_JSON: ${{ toJSON(github.event.client_payload.asset_metadata) }}
        run: |
          DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          # Build the assets list from the files we actually downloaded, pointing at the
          # public release we just created. URI-encode names so spaces or '+' survive.
          # Merge in any asset_metadata entries that match a downloaded filename; entries
          # naming a missing file are silently no-op'd, and only the recognised keys
          # (hidden, label) are copied through so an unexpected dispatch key can't bloat
          # the manifest.
          ASSETS_JSON="[]"
          META_JSON="${ASSET_METADATA_JSON:-null}"
          if [ "$META_JSON" = "null" ]; then META_JSON="{}"; fi
          for f in dist/*; do
            name=$(basename "$f")
            encoded=$(jq -rn --arg n "$name" '$n | @uri')
            url="https://github.com/${{ github.repository }}/releases/download/${APP}-v${VERSION}/${encoded}"
            ASSETS_JSON=$(echo "$ASSETS_JSON" | jq \
              --arg n "$name" \
              --arg u "$url" \
              --argjson meta "$META_JSON" \
              '
                ($meta[$n] // {}) as $m |
                . + [
                  {name: $n, url: $u}
                  + (if ($m.hidden // false) == true then {hidden: true} else {} end)
                  + (if ($m.label // "") != ""    then {label: $m.label} else {} end)
                ]
              ')
          done

          ENTRY=$(jq -n \
            --arg v "$VERSION" \
            --arg d "$DATE" \
            --arg sr "$SOURCE_REPO" \
            --arg st "$SOURCE_TAG" \
            --arg n "$NOTES" \
            --arg ru "$RELEASE_URL" \
            --argjson a "$ASSETS_JSON" \
            '{version: $v, date: $d, source_repo: $sr, source_tag: $st, notes: $n, release_url: $ru, assets: $a}')
          {
            echo "json<<EOF"
            echo "$ENTRY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit manifest update
        env:
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          ENTRY_JSON: ${{ steps.entry.outputs.json }}
          WEB_URL_JSON: ${{ toJSON(github.event.client_payload.web_url) }}
        run: |
          # The publisher's `concurrency.group: republish` serializes the workflow against
          # itself, but it doesn't protect against *other* writers to master (a manual
          # commit, a different workflow, a docs tweak). Those races used to produce
          # `non-fast-forward` push rejections and a stranded public release with no
          # manifest entry.
          #
          # We retry by rebuilding the manifest from disk on each attempt: after a
          # rebase, `docs/releases.json` may already contain newer entries from other
          # apps, so re-deriving the file in-loop produces the right merged state and
          # avoids the duplicate-commit / lost-update pattern of "commit once, push N
          # times".
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            git fetch origin master --quiet
            git reset --hard origin/master

            # web_url semantics (already type-validated above):
            #   null (omitted) -> preserve existing apps[$app].webUrl
            #   ""             -> clear apps[$app].webUrl
            #   "https://..."  -> set apps[$app].webUrl
            jq \
              --arg app "$APP" \
              --argjson entry "$ENTRY_JSON" \
              --argjson web "$WEB_URL_JSON" \
              --argjson maxReleases "$MAX_RELEASES_PER_APP" \
              '
                .apps[$app] = (.apps[$app] // {releases: []}) |
                .apps[$app].releases = (([$entry] + (.apps[$app].releases // [])) | .[0:$maxReleases]) |
                if   $web == null then .
                elif $web == ""   then del(.apps[$app].webUrl)
                else                   .apps[$app].webUrl = $web
                end
              ' docs/releases.json > docs/releases.json.tmp
            mv docs/releases.json.tmp docs/releases.json

            git add docs/releases.json
            if git diff --cached --quiet; then
              echo "No changes to commit (manifest already records ${APP} v${VERSION})"
              exit 0
            fi
            git commit -m "chore: publish ${APP} v${VERSION}"

            if git push; then
              exit 0
            fi
            echo "push rejected on attempt ${attempt}/${attempts}; rebuilding from latest origin/master"
            sleep $((attempt * 2))
          done
          echo "::error::failed to push manifest update after ${attempts} attempts"
          exit 1

      - name: Notify recipients
        if: github.event.client_payload.recipients_enc != ''
        env:
          NOTIFY_KEY: ${{ secrets.NOTIFY_KEY }}
          RECIPIENTS_ENC: ${{ github.event.client_payload.recipients_enc }}
          WINDMILL_URL: ${{ secrets.WINDMILL_URL }}
          WINDMILL_TOKEN: ${{ secrets.WINDMILL_TOKEN }}
          FALLBACK_TG_TOKEN: ${{ secrets.RELEASE_PUBLISHER_BOT_TOKEN }}
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          HEADLINE: ${{ steps.notes.outputs.value }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          REPO: ${{ github.repository }}
        run: |
          pip install --quiet 'cryptography>=42,<46'
          python3 .github/scripts/notify.py
